name: Publish Weekly Instagram Post

on:
  schedule:
    # Runs every Sunday at 09:00 UTC (approximately 10:00 Lisbon local time)
    - cron: '0 9 * * 0'
  workflow_dispatch: # Allows manual trigger at any time from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests

      - name: Commit Approved Recommendations to Database
        run: |
          python scripts/generate_post.py --commit

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add website/public/recommendations.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Commit approved recommendations DB [skip ci]" && git push)

      - name: Post to Instagram
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Give GitHub raw servers a brief moment to update cache for the raw image URL
          sleep 15
          python scripts/post_instagram.py
