name: Publish Weekly Instagram Post

on:
  schedule:
    # Runs every Sunday at 09:00 UTC (approximately 10:00 Lisbon local time)
    - cron: '0 9 * * 0'
  workflow_dispatch: # Allows manual trigger at any time from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Post to Instagram
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Give GitHub raw servers a brief moment to update cache for the raw image URL
          sleep 10
          python scripts/post_instagram.py
