name: Test Instagram Post (No Publish)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Verify Approved Draft
        run: python scripts/generate_post.py --verify-approved

      - name: Validate Meta Access
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          META_GRAPH_API_VERSION: v25.0
        run: python scripts/post_instagram.py --check-access

      - name: Prepare Unpublished Test Container
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          META_GRAPH_API_VERSION: v25.0
        run: python scripts/post_instagram.py --prepare

      - name: Remove Local Test Receipt
        if: ${{ always() }}
        run: rm -f scripts/instagram_publication.json scripts/instagram_publication.json.tmp

