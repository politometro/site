name: Pinecone Incremental Upload

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pinecone-client requests

      - name: Run Text Extraction
        run: |
          python scripts/extract_text.py

      - name: Upload new Chunks to Pinecone
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          python scripts/upload_pinecone.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add scripts/extracted_chunks.json scripts/uploaded_files.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update extracted chunks & upload tracking [skip ci]" && git push)
