name: Deliver Pending Suggestions

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deliver-pending-suggestions]

permissions:
  contents: write

concurrency:
  group: politometro-discord-suggestion-delivery
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Deliver Pending Suggestions
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_REVIEW_CHANNEL_ID: ${{ secrets.DISCORD_REVIEW_CHANNEL_ID }}
          WEBSITE_URL: ${{ vars.WEBSITE_URL }}
        run: python scripts/retry_pending_discord.py

      - name: Save Delivery Receipts
        if: ${{ always() }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add website/public/recommendations.json
          if ! git diff --cached --quiet; then
            git commit -m "Deliver pending suggestions [skip ci]"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && exit 0
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 10
            done
          fi
