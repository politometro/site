name: Generate Weekly Instagram Post

on:
  schedule:
    # Runs every Saturday at 19:00 UTC (approximately 20:00 Lisbon local time)
    - cron: '0 19 * * 6'
  workflow_dispatch: # Allows manual trigger at any time from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests discord.py

      - name: Auto Populate Recommendations using AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/auto_populate_ai.py

      - name: Generate Post Image & Caption
        run: |
          python scripts/generate_post.py --review
        env:
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      - name: Commit and Push Generated Post (Review Mode)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add website/public/current_post.png website/public/current_caption.txt scripts/review_draft.json scripts/cover_cache/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Generate weekly post draft for review [skip ci]" && git push)

      - name: Send Review Card to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_REVIEW_CHANNEL_ID: ${{ secrets.DISCORD_REVIEW_CHANNEL_ID }}
        run: |
          python scripts/send_to_discord.py
