name: Keep Hugging Face Space Alive

on:
  schedule:
    # Runs every 15 minutes so occasional GitHub schedule drift does not let
    # the Space sleep for long.
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read
  actions: write

concurrency:
  group: politometro-space-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Ping Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          auth_args=()
          if [ -n "$HF_TOKEN" ]; then
            auth_args=(-H "Authorization: Bearer $HF_TOKEN")
          fi
          page_code=$(curl -sS -L -o /dev/null -w "%{http_code}" \
            --retry 2 --retry-delay 5 --max-time 30 \
            "${auth_args[@]}" \
            https://huggingface.co/spaces/MaNmAxImO/politometro-bot || echo "000")
          backend_code=$(curl -sS -L -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 --max-time 30 \
            "${auth_args[@]}" \
            https://manmaximo-politometro-bot.hf.space || echo "000")
          echo "Hugging Face page HTTP: $page_code"
          echo "Hugging Face backend HTTP: $backend_code"
          echo "Ping enviado com sucesso!"

      - name: Recover Missing Weekly Proposal
        if: ${{ github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/recover_weekly_generation.py
