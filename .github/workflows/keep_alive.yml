name: Keep Hugging Face Space Alive

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          # Pings your Hugging Face Space page and its direct backend domain
          curl -s https://huggingface.co/spaces/MaNmAxImO/politometro-bot > /dev/null || true
          curl -s https://manmaximo-politometro-bot.hf.space > /dev/null || true
          echo "Ping enviado com sucesso!"
