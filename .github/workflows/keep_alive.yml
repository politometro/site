name: Keep Hugging Face Space Alive

on:
  schedule:
    # Runs every 15 minutes so occasional GitHub schedule drift does not let
    # the Space sleep for long.
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read
  actions: write

concurrency:
  group: politometro-space-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Ping Hugging Face Space
        run: |
          # Ping the Space page and the backend directly with retries. Failures
          # should surface in Actions instead of passing silently.
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            https://huggingface.co/spaces/MaNmAxImO/politometro-bot > /dev/null
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            https://manmaximo-politometro-bot.hf.space > /dev/null
          echo "Ping enviado com sucesso!"

      - name: Recover Missing Weekly Proposal
        if: ${{ github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/recover_weekly_generation.py
